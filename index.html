<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROLEX UNISEX SALON</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            color: #d4af37; /* Gold */
        }

        h1 {
            font-size: 38px;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 50px;
            color: #d4af37;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 80%;
            max-width: 350px;
        }

        .btn {
            background-color: #111;
            border: 2px solid #d4af37;
            color: #d4af37;
            padding: 16px;
            font-size: 20px;
            font-weight: 700;
            border-radius: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #d4af37;
            color: #000;
            transform: scale(1.05);
        }

    </style>
</head>
<body>

    <h1>ROLEX UNISEX SALON</h1>

    <div class="btn-container">
        <button class="btn">MEN</button>
        <button class="btn">WOMEN</button>
        <button class="btn">KIDS</button>
    </div>

</body>
</html>
